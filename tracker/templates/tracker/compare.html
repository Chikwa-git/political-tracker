{% load static %}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparador · Radar Político</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0a0a0a; --surface: #111111; --surface-2: #161616;
        --border: #222222; --accent: #00ff87; --accent-dim: rgba(0,255,135,0.08);
        --text: #e8e8e8; --text-muted: #666666; --text-dim: #333333;
        --yes: #00ff87; --no: #ff3b3b; --abstain: #ffaa00;
      }

      html, body { background: var(--bg); color: var(--text); font-family: "IBM Plex Sans", sans-serif; }

      body::before {
        content: ""; position: fixed; inset: 0;
        background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 60px 60px; pointer-events: none; z-index: 0; opacity: 0.3;
      }

      .wrapper { position: relative; z-index: 1; min-height: 100vh; }

      header {
        border-bottom: 1px solid var(--border); padding: 1.5rem 3rem;
        display: flex; align-items: center; justify-content: space-between;
        backdrop-filter: blur(10px); background: rgba(10,10,10,0.85);
        position: sticky; top: 0; z-index: 100;
      }

      .logo { font-family: "Bebas Neue", sans-serif; font-size: 1.8rem; letter-spacing: 0.1em; color: var(--text); text-decoration: none; }
      .logo span { color: var(--accent); }

      .page-title {
        font-family: "IBM Plex Mono", monospace; font-size: 0.65rem;
        letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
        border: 1px solid var(--border); padding: 0.3rem 0.75rem;
      }

      .compare-hero {
        padding: 4rem 3rem 3rem; text-align: center;
        border-bottom: 1px solid var(--border);
      }

      .compare-hero h1 {
        font-family: "Bebas Neue", sans-serif; font-size: clamp(3rem, 8vw, 6rem);
        line-height: 0.9; margin-bottom: 1rem;
        background: linear-gradient(180deg, #fff 0%, #888 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }

      .compare-hero p { font-size: 0.9rem; color: var(--text-muted); max-width: 400px; margin: 0 auto; }

      .search-grid {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 1px; background: var(--border);
        border-bottom: 1px solid var(--border);
      }

      .search-panel { background: var(--bg); padding: 2rem 3rem; }

      .panel-label {
        font-family: "IBM Plex Mono", monospace; font-size: 0.6rem;
        letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent);
        margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem;
      }

      .panel-label::before { content: ""; width: 20px; height: 1px; background: var(--accent); }

      .search-form {
        display: flex; border: 1px solid var(--border);
        background: var(--surface); transition: border-color 0.2s;
        margin-bottom: 1.5rem;
      }

      .search-form:focus-within { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

      .search-input {
        flex: 1; background: transparent; border: none; outline: none;
        padding: 0.9rem 1.2rem; font-family: "IBM Plex Sans", sans-serif;
        font-size: 0.9rem; color: var(--text);
      }

      .search-input::placeholder { color: var(--text-dim); }

      .search-btn {
        background: var(--accent); color: #000; border: none;
        padding: 0.9rem 1.4rem; font-family: "IBM Plex Mono", monospace;
        font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em;
        text-transform: uppercase; cursor: pointer; transition: opacity 0.15s;
      }

      .search-btn:hover { opacity: 0.85; }

      .search-results { display: none; flex-direction: column; gap: 1px; background: var(--border); }
      .search-results.visible { display: flex; }

      .result-item {
        background: var(--surface); padding: 0.9rem 1rem;
        display: flex; align-items: center; gap: 0.9rem;
        cursor: pointer; transition: background 0.15s;
      }

      .result-item:hover { background: var(--surface-2); }

      .result-avatar { width: 40px; height: 40px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }

      .result-name { font-size: 0.85rem; color: var(--text); margin-bottom: 0.2rem; }

      .result-meta { display: flex; gap: 0.4rem; }

      .tag {
        font-family: "IBM Plex Mono", monospace; font-size: 0.55rem;
        letter-spacing: 0.1em; padding: 0.15rem 0.4rem;
        border: 1px solid var(--border); color: var(--text-muted); text-transform: uppercase;
      }

      .tag-party { border-color: rgba(0,255,135,0.3); color: var(--accent); }

      .selected-card {
        display: none; padding: 1.5rem 1rem;
        background: var(--surface-2); border: 1px solid var(--border);
        align-items: center; gap: 1rem;
      }

      .selected-card.visible { display: flex; }

      .selected-photo { width: 56px; height: 66px; object-fit: cover; object-position: top; border: 1px solid var(--border); }

      .selected-name { font-family: "Bebas Neue", sans-serif; font-size: 1.4rem; color: var(--text); }

      .selected-meta { font-family: "IBM Plex Mono", monospace; font-size: 0.6rem; color: var(--accent); letter-spacing: 0.1em; margin-top: 0.3rem; }

      .change-btn {
        margin-left: auto; background: transparent; border: 1px solid var(--border);
        color: var(--text-muted); padding: 0.4rem 0.8rem;
        font-family: "IBM Plex Mono", monospace; font-size: 0.6rem;
        letter-spacing: 0.1em; cursor: pointer; transition: border-color 0.15s, color 0.15s;
      }

      .change-btn:hover { border-color: var(--accent); color: var(--accent); }

      /* COMPARISON RESULT */
      .compare-result { display: none; }
      .compare-result.visible { display: block; }

      .compare-action {
        padding: 2rem 3rem; text-align: center;
        border-bottom: 1px solid var(--border);
        display: none;
      }

      .compare-action.visible { display: block; }

      .compare-btn {
        background: var(--accent); color: #000; border: none;
        padding: 1rem 3rem; font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem; font-weight: 500; letter-spacing: 0.2em;
        text-transform: uppercase; cursor: pointer; transition: opacity 0.15s;
      }

      .compare-btn:hover { opacity: 0.85; }

      .compare-grid {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 1px; background: var(--border);
      }

      .compare-col { background: var(--bg); }

      .compare-deputy-header {
        padding: 2rem 2.5rem; border-bottom: 1px solid var(--border);
        background: var(--surface); display: flex; align-items: center; gap: 1.5rem;
      }

      .compare-photo { width: 70px; height: 83px; object-fit: cover; object-position: top; border: 1px solid var(--border); }

      .compare-name { font-family: "Bebas Neue", sans-serif; font-size: 2rem; line-height: 1; color: var(--text); margin-bottom: 0.4rem; }

      .compare-party { font-family: "IBM Plex Mono", monospace; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--accent); }

      .stat-row {
        padding: 1.5rem 2.5rem; border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
      }

      .stat-label-text { font-family: "IBM Plex Mono", monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }

      .stat-val { font-family: "Bebas Neue", sans-serif; font-size: 2.5rem; color: var(--accent); }
      .stat-val.lower { color: var(--no); }

      .bar-track { height: 3px; background: var(--border); margin-top: 0.5rem; }
      .bar-fill { height: 3px; background: var(--accent); transition: width 1s ease; }
      .bar-fill.lower { background: var(--no); }

      .loading-state {
        padding: 3rem; text-align: center;
        font-family: "IBM Plex Mono", monospace; font-size: 0.7rem;
        letter-spacing: 0.15em; color: var(--text-muted);
      }

      @media (max-width: 768px) {
        .search-grid { grid-template-columns: 1fr; }
        .compare-grid { grid-template-columns: 1fr; }
        header { padding: 1rem 1.5rem; }
        .search-panel { padding: 1.5rem; }
        .compare-hero { padding: 3rem 1.5rem 2rem; }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <a href="/" class="logo">Radar<span>Político</span></a>
        <span class="page-title">Comparador de Deputados</span>
      </header>

      <div class="compare-hero">
        <h1>Compare<br>Deputados</h1>
        <p>Busque dois deputados e compare presença e alinhamento lado a lado.</p>
      </div>

      <div class="search-grid">
        <!-- PAINEL A -->
        <div class="search-panel" id="panel-a">
          <div class="panel-label">Digite o nome do Deputado Federal</div>
          <div class="search-form" id="form-a">
            <input class="search-input" type="text" placeholder="Nome do deputado..." autocomplete="off" id="input-a" />
            <button class="search-btn" onclick="searchDeputy('a')">Buscar</button>
          </div>
          <div class="search-results" id="results-a"></div>
          <div class="selected-card" id="selected-a">
            <img class="selected-photo" id="photo-a" src="" alt="" />
            <div>
              <div class="selected-name" id="name-a"></div>
              <div class="selected-meta" id="meta-a"></div>
            </div>
            <button class="change-btn" onclick="clearSelection('a')">Trocar</button>
          </div>
        </div>

        <!-- PAINEL B -->
        <div class="search-panel" id="panel-b">
          <div class="panel-label">Digite o nome do Deputado Federal</div>
          <div class="search-form" id="form-b">
            <input class="search-input" type="text" placeholder="Nome do deputado..." autocomplete="off" id="input-b" />
            <button class="search-btn" onclick="searchDeputy('b')">Buscar</button>
          </div>
          <div class="search-results" id="results-b"></div>
          <div class="selected-card" id="selected-b">
            <img class="selected-photo" id="photo-b" src="" alt="" />
            <div>
              <div class="selected-name" id="name-b"></div>
              <div class="selected-meta" id="meta-b"></div>
            </div>
            <button class="change-btn" onclick="clearSelection('b')">Trocar</button>
          </div>
        </div>
      </div>

      <div class="compare-action" id="compare-action">
        <button class="compare-btn" onclick="runComparison()">Comparar →</button>
      </div>

      <div class="compare-result" id="compare-result"></div>

    </div>
    <script src="{% static 'tracker/js/compare.js' %}"></script>
  </body>
</html>
